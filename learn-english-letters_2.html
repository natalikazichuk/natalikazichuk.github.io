<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вивчаю англійську абетку</title>
<style>
  :root {
    --bg: #ffffff; --bg-secondary: #f4f3ee; --bg-success: #eaf3de; --bg-danger: #fcebeb;
    --text: #1a1a1a; --text-secondary: #6b6a64; --text-success: #27500a; --text-danger: #791f1f;
    --text-warning: #854f0b; --text-info: #185fa5; --border: rgba(0,0,0,0.13);
    --radius-md: 8px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #2c2c2a; --bg-success: #173404; --bg-danger: #501313;
      --text: #f1efe8; --text-secondary: #b4b2a9; --text-success: #c0dd97; --text-danger: #f7c1c1;
      --text-warning: #fac775; --text-info: #85b7eb; --border: rgba(255,255,255,0.16);
    }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.5; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 60px; }
  .header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .header .emoji { font-size:28px; }
  .header h1 { font-size:17px; font-weight:600; margin:0; }
  .header p { font-size:13px; color:var(--text-secondary); margin:2px 0 0; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  button { font-family:inherit; font-size:14px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--bg); color:var(--text); cursor:pointer; transition:background .15s ease; }
  button:hover { background:var(--bg-secondary); }
  button:active { transform:scale(.98); }
  .mode-card { display:flex; flex-direction:column; align-items:flex-start; gap:6px; padding:18px 16px; min-height:96px; text-align:left; }
  .mode-emoji { font-size:26px; }
  .mode-title { font-weight:600; font-size:15px; }
  .mode-sub { font-size:12px; color:var(--text-secondary); }
  .top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-size:13px; color:var(--text-secondary); }
  .progress-track { height:6px; background:var(--bg-secondary); border-radius:3px; margin-bottom:22px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--text-info); border-radius:3px; transition:width .3s ease; }
  .card {
    background:var(--bg-secondary); border-radius:var(--radius-lg); padding:40px 24px; margin-bottom:18px;
    text-align:center; cursor:pointer; min-height:260px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    user-select:none;
  }
  .card .big-letter { font-size:110px; font-weight:700; margin:0; line-height:1; }
  .card .pair-letter { font-size:64px; font-weight:700; margin:0; line-height:1; }
  .card .name { font-size:26px; color:var(--text-warning); margin:4px 0 0; font-weight:600; }
  .card .sound { font-size:22px; color:var(--text-info); margin:6px 0 0; font-weight:600; }
  .card .pic { font-size:80px; margin:0; }
  .card .example { font-size:30px; font-weight:700; margin:6px 0 0; }
  .card .example b { color:var(--text-info); }
  .card .ipa { font-size:19px; color:var(--text-info); margin:2px 0 0; font-weight:500; }
  .card .tap-hint { font-size:13px; color:var(--text-secondary); margin-top:10px; }
  .grade-row { display:flex; gap:10px; margin-bottom:14px; }
  .grade-row button { flex:1; padding:14px; font-weight:600; font-size:15px; }
  .grade-no { color:var(--text-danger); border-color:var(--text-danger); }
  .grade-yes { color:var(--text-success); border-color:var(--text-success); }
  .single-btn { width:100%; padding:14px; font-weight:600; }
  .toolbar { display:flex; gap:8px; }
  .toolbar button { flex:1; padding:10px; font-size:13px; }
  .result-box { text-align:center; padding:6px 0; }
  .result-emoji { font-size:48px; }
  .result-title { font-size:19px; font-weight:600; margin:14px 0 4px; }
  .result-sub { font-size:14px; color:var(--text-secondary); margin:0 0 22px; }
  .stat-row { display:flex; gap:12px; margin-bottom:22px; }
  .stat-card { flex:1; background:var(--bg-secondary); border-radius:var(--radius-md); padding:14px; }
  .stat-label { font-size:12px; color:var(--text-secondary); margin:0 0 4px; }
  .stat-value { font-size:24px; font-weight:700; margin:0; }
  .result-actions { display:flex; gap:8px; }
  .result-actions button { flex:1; padding:12px; font-weight:600; }
</style>
</head>
<body>
<div class="wrap"><div id="root"></div></div>

<script>
(function(){
  const root = document.getElementById('root');
  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=randInt(0,i); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  // Англійська абетка: велика, мала, назва букви (укр.), слово-приклад, переклад, емодзі
  const letters = [
    {up:"A", lo:"a", name:"ей", word:"Apple", ipa:"/ˈæpl/", ua:"яблуко", pic:"🍎"},
    {up:"B", lo:"b", name:"бі", word:"Ball", ipa:"/bɔːl/", ua:"м'яч", pic:"⚽"},
    {up:"C", lo:"c", name:"сі", word:"Cat", ipa:"/kæt/", ua:"кіт", pic:"🐱"},
    {up:"D", lo:"d", name:"ді", word:"Dog", ipa:"/dɒɡ/", ua:"собака", pic:"🐶"},
    {up:"E", lo:"e", name:"і", word:"Egg", ipa:"/eɡ/", ua:"яйце", pic:"🥚"},
    {up:"F", lo:"f", name:"еф", word:"Fish", ipa:"/fɪʃ/", ua:"риба", pic:"🐟"},
    {up:"G", lo:"g", name:"джі", word:"Girl", ipa:"/ɡɜːl/", ua:"дівчинка", pic:"👧"},
    {up:"H", lo:"h", name:"ейч", word:"Hat", ipa:"/hæt/", ua:"капелюх", pic:"🎩"},
    {up:"I", lo:"i", name:"ай", word:"Ice", ipa:"/aɪs/", ua:"лід", pic:"🧊"},
    {up:"J", lo:"j", name:"джей", word:"Jam", ipa:"/dʒæm/", ua:"джем", pic:"🍓"},
    {up:"K", lo:"k", name:"кей", word:"Key", ipa:"/kiː/", ua:"ключ", pic:"🔑"},
    {up:"L", lo:"l", name:"ел", word:"Lion", ipa:"/ˈlaɪən/", ua:"лев", pic:"🦁"},
    {up:"M", lo:"m", name:"ем", word:"Moon", ipa:"/muːn/", ua:"місяць", pic:"🌙"},
    {up:"N", lo:"n", name:"ен", word:"Nose", ipa:"/nəʊz/", ua:"ніс", pic:"👃"},
    {up:"O", lo:"o", name:"оу", word:"Orange", ipa:"/ˈɒrɪndʒ/", ua:"апельсин", pic:"🍊"},
    {up:"P", lo:"p", name:"пі", word:"Pen", ipa:"/pen/", ua:"ручка", pic:"🖊️"},
    {up:"Q", lo:"q", name:"к'ю", word:"Queen", ipa:"/kwiːn/", ua:"королева", pic:"👑"},
    {up:"R", lo:"r", name:"ар", word:"Rabbit", ipa:"/ˈræbɪt/", ua:"кролик", pic:"🐰"},
    {up:"S", lo:"s", name:"ес", word:"Sun", ipa:"/sʌn/", ua:"сонце", pic:"☀️"},
    {up:"T", lo:"t", name:"ті", word:"Tree", ipa:"/triː/", ua:"дерево", pic:"🌳"},
    {up:"U", lo:"u", name:"ю", word:"Umbrella", ipa:"/ʌmˈbrelə/", ua:"парасолька", pic:"☂️"},
    {up:"V", lo:"v", name:"ві", word:"Van", ipa:"/væn/", ua:"фургон", pic:"🚐"},
    {up:"W", lo:"w", name:"дабл-ю", word:"Water", ipa:"/ˈwɔːtə/", ua:"вода", pic:"💧"},
    {up:"X", lo:"x", name:"екс", word:"Box", ipa:"/bɒks/", ua:"коробка", pic:"📦"},
    {up:"Y", lo:"y", name:"вай", word:"Yellow", ipa:"/ˈjeləʊ/", ua:"жовтий", pic:"🟡"},
    {up:"Z", lo:"z", name:"зед", word:"Zebra", ipa:"/ˈzebrə/", ua:"зебра", pic:"🦓"}
  ];

  const modes = [
    {id:'name', emoji:'🔤', title:'Буква і назва', sub:'Велика буква → як читається'},
    {id:'examples', emoji:'🖼️', title:'Буква і слово', sub:'Буква → слово на цю букву'},
    {id:'find', emoji:'🔎', title:'Знайди букву', sub:'Картинка → з якої букви слово', span:true}
  ];

  let state = {screen:'menu'};

  function startMode(modeId){
    state = {
      screen:'card', mode:modeId, deck:shuffle(letters), index:0, flipped:false,
      known:0, unknown:0, repeatPile:[]
    };
    render();
  }

  function flip(){ if(state.screen==='card'){ state.flipped=!state.flipped; render(); } }

  function grade(known){
    const card = state.deck[state.index];
    if(known) state.known++;
    else { state.unknown++; state.repeatPile.push(card); }
    state.index++;
    state.flipped=false;
    if(state.index>=state.deck.length){
      if(state.repeatPile.length>0){
        state.deck = shuffle(state.repeatPile);
        state.repeatPile = [];
        state.index = 0;
        state.round = (state.round||1)+1;
        render();
      } else {
        state.screen='result';
        render();
      }
    } else {
      render();
    }
  }

  function backToMenu(){ state={screen:'menu'}; render(); }

  window.__app = {startMode, flip, grade, backToMenu};

  function render(){
    if(state.screen==='menu') renderMenu();
    else if(state.screen==='card') renderCard();
    else renderResult();
  }

  function renderMenu(){
    root.innerHTML = `
      <div class="header">
        <span class="emoji">📖</span>
        <div><h1>Вивчаю англійську абетку</h1><p>English ABC · ${letters.length} букв</p></div>
      </div>
      <div class="grid">
        ${modes.map(m=>`
          <button class="mode-card" style="${m.span?'grid-column:1 / -1;':''}" onclick="window.__app.startMode('${m.id}')">
            <span class="mode-emoji">${m.emoji}</span>
            <span class="mode-title">${m.title}</span>
            <span class="mode-sub">${m.sub}</span>
          </button>
        `).join('')}
      </div>
    `;
  }

  function highlightWord(word){
    return `<b>${word.charAt(0)}</b>${word.slice(1)}`;
  }

  function renderCard(){
    const total = state.deck.length;
    const done = state.index;
    const pct = Math.round(done/total*100);
    const c = state.deck[state.index];

    let frontHtml, backHtml;

    if(state.mode==='name'){
      // Front: велика й мала буква. Back: назва + слово-приклад
      frontHtml = `
        <p class="big-letter">${c.up} ${c.lo}</p>
        <p class="tap-hint">Як читається ця буква? Натисни</p>`;
      backHtml = `
        <p class="pair-letter">${c.up} ${c.lo}</p>
        <p class="name">[${c.name}]</p>
        <p class="pic">${c.pic}</p>
        <p class="example">${highlightWord(c.word)}</p>
        <p class="ipa">${c.ipa}</p>`;
    } else if(state.mode==='examples'){
      // Front: буква. Back: слово + картинка + переклад
      frontHtml = `
        <p class="big-letter">${c.up} ${c.lo}</p>
        <p class="tap-hint">Яке слово на цю букву? Натисни</p>`;
      backHtml = `
        <p class="pic">${c.pic}</p>
        <p class="example">${highlightWord(c.word)}</p>
        <p class="ipa">${c.ipa}</p>
        <p class="sound">${c.ua}</p>`;
    } else {
      // find: Front: картинка + слово. Back: з якої букви
      frontHtml = `
        <p class="pic">${c.pic}</p>
        <p class="example">${c.word}</p>
        <p class="ipa">${c.ipa}</p>
        <p class="tap-hint">З якої букви це слово? Натисни</p>`;
      backHtml = `
        <p class="big-letter">${c.up} ${c.lo}</p>
        <p class="name">[${c.name}]</p>
        <p class="sound">${c.ua}</p>`;
    }

    root.innerHTML = `
      <div class="top-row">
        <span>${modes.find(m=>m.id===state.mode).title}${state.round?(' · коло '+state.round):''}</span>
        <span>${done+1} / ${total}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div class="card" onclick="window.__app.flip()">
        ${state.flipped?backHtml:frontHtml}
      </div>
      ${state.flipped?`
        <div class="grade-row">
          <button class="grade-no" onclick="window.__app.grade(false)">😕 Ще вчу</button>
          <button class="grade-yes" onclick="window.__app.grade(true)">😃 Знаю</button>
        </div>
      `:`
        <button class="single-btn" onclick="window.__app.flip()">Перевернути картку</button>
      `}
      <div class="toolbar">
        <button onclick="window.__app.backToMenu()">← До меню</button>
      </div>
    `;
  }

  function renderResult(){
    root.innerHTML = `
      <div class="result-box">
        <div class="result-emoji">🎉</div>
        <p class="result-title">Усі букви пройдено!</p>
        <p class="result-sub">Ти повторював букви, поки не вивчив кожну</p>
        <div class="stat-row">
          <div class="stat-card">
            <p class="stat-label">Знав одразу</p>
            <p class="stat-value">${state.known}</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Повторив</p>
            <p class="stat-value">${state.unknown}</p>
          </div>
        </div>
        <div class="result-actions">
          <button onclick="window.__app.backToMenu()">Обрати інший режим</button>
        </div>
      </div>
    `;
  }

  render();
})();
</script>
</body>
</html>
